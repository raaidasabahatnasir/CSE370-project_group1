<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Garment Factory Safety</title>
  
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  
  <style>
    .auth-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 30px;
    }
    
    .auth-logo-icon {
      width: 40px;
      height: 40px;
      background: var(--blue);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    
    .auth-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    
    .auth-subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 30px;
    }
    
    .error-msg {
      background: #ef444420;
      color: #ef4444;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
      border: 1px solid #ef444430;
    }
  </style>
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
      </div>
      <div>
        <h1 style="font-size: 18px; font-weight: 700;">Safety Monitor</h1>
        <p style="font-size: 11px; color: var(--muted);">Factory Safety Management</p>
      </div>
    </div>

    <h2 class="auth-title">Create Account</h2>
    <p class="auth-subtitle">Join the safety management network</p>

    <div class="error-msg" id="errorMsg"></div>

    <form id="registerForm">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-control" id="name" placeholder="John Doe" required>
      </div>
      <div class="form-group" style="margin-top: 20px;">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" id="email" placeholder="manager@factory.com" required>
      </div>
      <div class="form-group" style="margin-top: 20px;">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" id="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-primary" id="registerBtn" style="margin-top: 30px;">Create Account</button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="/auth/login">Sign In</a>
    </div>
  </div>
</div>

<script>
  // Redirect if already logged in
  if (localStorage.getItem('token')) window.location.href = '/';

  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('registerBtn');
    const errEl = document.getElementById('errorMsg');
    errEl.style.display = 'none';
    btn.textContent = 'Creating account...';
    btn.disabled = true;

    try {
      const res = await fetch('http://localhost:3000/auth/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: document.getElementById('name').value,
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Registration failed');
      
      // Save user info and token (Auto-login)
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      
      // Show success state on button
      btn.textContent = 'Account Created!';
      btn.style.background = 'var(--green)';
      
      setTimeout(() => {
        window.location.href = '/';
      }, 800);
    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = 'block';
      btn.textContent = 'Create Account';
      btn.disabled = false;
    }
  });
</script>

</body>
</html>
